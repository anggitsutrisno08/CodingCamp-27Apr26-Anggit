<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Budget Visualizer</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-theme="light">
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Expense Tracker</h1>
                <div class="header-controls">
                    <button id="manage-categories-btn" class="icon-btn" aria-label="Manage Categories" title="Manage Categories">
                        🏷️
                    </button>
                    <button id="theme-toggle" class="icon-btn" aria-label="Toggle theme" title="Toggle Dark/Light Mode">
                        🌙
                    </button>
                </div>
            </div>
        </header>
        <main>
            <!-- Error message display -->
            <div id="error-message" class="error-message" style="display: none;"></div>
            
            <!-- Transaction input form -->
            <section class="form-section">
                <h2>Add Transaction</h2>
                <form id="transaction-form">
                    <div class="form-group">
                        <label for="item-name">Item Name</label>
                        <input type="text" id="item-name" name="item-name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" name="amount" step="0.01" min="0.01" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" required>
                            <option value="">Select a category</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Fun">Fun</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="btn-submit">Add Transaction</button>
                </form>
            </section>
            
            <!-- Balance display -->
            <section class="balance-section">
                <h2>Total Balance</h2>
                <div class="balance-display">
                    <span class="currency">$</span>
                    <span id="balance-amount">0.00</span>
                </div>
            </section>
            
            <!-- Content area with transaction list and chart -->
            <div class="content-area">
                <!-- Transaction list -->
                <section class="transaction-section">
                    <div class="section-header">
                        <h2>Transactions</h2>
                        <div class="sort-controls">
                            <button class="sort-btn active" data-sort="timestamp" title="Sort by Date">Date</button>
                            <button class="sort-btn" data-sort="amount" title="Sort by Amount">Amount</button>
                            <button class="sort-btn" data-sort="category" title="Sort by Category">Category</button>
                        </div>
                    </div>
                    <div id="transaction-list" class="transaction-list">
                        <p class="empty-state">No transactions yet</p>
                    </div>
                </section>
                
                <!-- Pie chart visualization -->
                <section class="chart-section">
                    <h2>Spending by Category</h2>
                    <div class="chart-container">
                        <canvas id="pie-chart"></canvas>
                    </div>
                </section>
            </div>
        </main>
    </div>
    
    <!-- Category Management Modal -->
    <div id="category-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Manage Categories</h2>
                <button id="close-category-modal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Add new category form -->
                <form id="category-form" class="category-form">
                    <h3>Add New Category</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="new-category-name">Category Name</label>
                            <input type="text" id="new-category-name" required>
                        </div>
                        <div class="form-group">
                            <label for="new-category-color">Color</label>
                            <input type="color" id="new-category-color" value="#FF6B6B" required>
                        </div>
                        <button type="submit" class="btn-add-category">Add</button>
                    </div>
                </form>
                
                <!-- Existing categories list -->
                <div class="categories-list">
                    <h3>Existing Categories</h3>
                    <div id="category-management"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
